<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WA Tugas Bot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">WA Tugas · Panel Grup</span>
    </div>

    <h1>Masuk ke dashboard</h1>
    <p class="subtitle">Kelola grup WhatsApp mana saja yang boleh dibalas bot.</p>

    <form id="login-form">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit" class="btn-primary" id="login-btn">Masuk</button>
      <p class="error-msg" id="error-msg"></p>
    </form>

    <div class="setup-hint">
      Belum punya akun? Buat lewat terminal server:<br>
      <code>python -m backend.scripts.create_admin</code>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  (async () => {
    // Kalau session masih valid, langsung lempar ke dashboard
    const ok = await checkSession();
    if (ok) window.location.href = "app.html";
  })();

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("login-btn");
    const errorMsg = document.getElementById("error-msg");
    errorMsg.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Memproses...";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await apiFetch("/api/auth/login", {
        method: "POST",
        body: JSON.stringify({ username, password }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || "Login gagal.");
      }
      window.location.href = "app.html";
    } catch (err) {
      errorMsg.textContent = "❌ " + err.message;
      errorMsg.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Masuk";
    }
  });
</script>
</body>
</html>
